<svg xmlns="http://www.w3.org/2000/svg" width="520" height="140" viewBox="0 0 520 140">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#121009"/>
      <stop offset="100%" stop-color="#1e1812"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="btmBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#f97316" flood-opacity="0.18"/>
    </filter>
    <style>
      @keyframes slideUp {
        from { opacity:0; transform:translateY(14px) }
        to   { opacity:1; transform:translateY(0) }
      }
      .s1 { animation: slideUp .75s .10s cubic-bezier(.16,1,.3,1) both }
      .s2 { animation: slideUp .75s .28s cubic-bezier(.16,1,.3,1) both }
      .s3 { animation: slideUp .75s .46s cubic-bezier(.16,1,.3,1) both }
    </style>
  </defs>

  <!-- Card background + shadow -->
  <rect width="520" height="140" rx="14" fill="url(#bg)" filter="url(#sh)"/>
  <!-- Border -->
  <rect width="520" height="140" rx="14" fill="none" stroke="#f97316" stroke-width="0.6" stroke-opacity="0.25"/>
  <!-- Top accent bar -->
  <rect width="520" height="3.5" rx="1.75" fill="url(#topBar)"/>
  <!-- Bottom accent bar -->
  <rect y="136.5" width="520" height="3.5" rx="1.75" fill="url(#btmBar)"/>

  <!-- ── Stat 1 : 10× ──────────────────────────────────────────────────── -->
  <g class="s1">
    <text x="87" y="72"
      text-anchor="middle"
      font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="46" font-weight="800" fill="#f97316">10×</text>
    <text x="87" y="98"
      text-anchor="middle"
      font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="9.5" font-weight="600" letter-spacing="1.2" fill="#8a7d6a">FASTER WITH AI</text>
  </g>

  <!-- Divider 1 -->
  <line x1="174" y1="28" x2="174" y2="112" stroke="#f97316" stroke-width="0.5" stroke-opacity="0.22"/>

  <!-- ── Stat 2 : 98% ──────────────────────────────────────────────────── -->
  <g class="s2">
    <text x="260" y="72"
      text-anchor="middle"
      font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="46" font-weight="800" fill="#f97316">98%</text>
    <text x="260" y="98"
      text-anchor="middle"
      font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="9.5" font-weight="600" letter-spacing="1.2" fill="#8a7d6a">ON-TIME DELIVERY</text>
  </g>

  <!-- Divider 2 -->
  <line x1="346" y1="28" x2="346" y2="112" stroke="#f97316" stroke-width="0.5" stroke-opacity="0.22"/>

  <!-- ── Stat 3 : 100% ─────────────────────────────────────────────────── -->
  <g class="s3">
    <text x="433" y="72"
      text-anchor="middle"
      font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="46" font-weight="800" fill="#f97316">100%</text>
    <text x="433" y="98"
      text-anchor="middle"
      font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="9.5" font-weight="600" letter-spacing="1.2" fill="#8a7d6a">POST-LAUNCH SUPPORT</text>
  </g>
</svg>
